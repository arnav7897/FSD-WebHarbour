<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reset Password - WebHarbour</title>
  <link rel="stylesheet" href="../../css/main.css" />
</head>
<body>
  <div id="nav"></div>
  <main class="container grid grid-2">
    <div class="card">
      <h2 class="section-title">Request reset</h2>
      <form id="resetRequestForm">
        <div class="form-row">
          <label>Email</label>
          <input class="input" type="email" name="email" required />
        </div>
        <button class="button" type="submit">Send token</button>
      </form>
    </div>
    <div class="card">
      <h2 class="section-title">Confirm reset</h2>
      <form id="resetConfirmForm">
        <div class="form-row">
          <label>Email</label>
          <input class="input" type="email" name="email" required />
        </div>
        <div class="form-row">
          <label>Token</label>
          <input class="input" type="text" name="token" required />
        </div>
        <div class="form-row">
          <label>New password</label>
          <input class="input" type="password" name="newPassword" required />
        </div>
        <button class="button" type="submit">Reset password</button>
      </form>
    </div>
  </main>

  <script src="../../js/config.js"></script>
  <script src="../../js/api.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/ui.js"></script>
  <script src="../../js/nav.js"></script>
  <script src="../../js/app.js"></script>
  <script src="../../js/pages/auth/reset.js"></script>
</body>
</html>
