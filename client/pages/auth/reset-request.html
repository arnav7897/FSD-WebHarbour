<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' http://localhost:4000;" />
  <title>Reset Password - WebHarbour</title>
  <link rel="stylesheet" href="../../css/main.css" />
</head>

<body>
  <div id="nav"></div>
  <main class="container grid grid-2">
    <div class="card">
      <h2 class="section-title">Send reset email</h2>
      <p class="muted" style="margin-bottom: 12px;">We’ll email a one-time code to your address.</p>
      <form id="resetRequestForm">
        <div class="form-row">
          <label for="request-email">Email address</label>
          <input id="request-email" class="input" type="email" name="email" required autocomplete="email" />
        </div>
        <button class="button" type="submit">Send reset link</button>
      </form>
    </div>
    <div class="card">
      <h2 class="section-title">Use your code</h2>
      <p class="muted" style="margin-bottom: 12px;">Paste the code from your email and choose a new password.</p>
      <form id="resetConfirmForm">
        <div class="form-row">
          <label for="confirm-email">Email address</label>
          <input id="confirm-email" class="input" type="email" name="email" required autocomplete="email" />
        </div>
        <div class="form-row">
          <label for="token">Reset code</label>
          <input id="token" class="input" type="text" name="token" required />
        </div>
        <div class="form-row">
          <label for="newPassword">New password</label>
          <input id="newPassword" class="input" type="password" name="newPassword" required
            autocomplete="new-password" />
        </div>
        <button class="button" type="submit">Apply new password</button>
      </form>
    </div>
  </main>

  <script src="../../js/config.js"></script>
  <script src="../../js/api.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/ui.js"></script>
  <script src="../../js/nav.js"></script>
  <script src="../../js/app.js"></script>
  <script src="../../js/pages/auth/reset.js"></script>
</body>

</html>
