<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' http://localhost:4000;" />
  <title>Register - WebHarbour</title>
  <link rel="stylesheet" href="../../css/main.css" />
</head>

<body>
  <div id="nav"></div>
  <main class="container">
    <div class="card" style="max-width: 520px; margin: 0 auto;">
      <h2 class="section-title">Create your WebHarbour account</h2>
      <p class="muted" style="margin-bottom: 16px;">Join the marketplace to publish your app listings and track
        installs.</p>
      <form id="registerForm">
        <div class="form-row">
          <label for="name">Full name</label>
          <input id="name" class="input" type="text" name="name" required autocomplete="name" />
        </div>
        <div class="form-row">
          <label for="email">Email address</label>
          <input id="email" class="input" type="email" name="email" required autocomplete="email" />
        </div>
        <div class="form-row">
          <label for="password">Password</label>
          <input id="password" class="input" type="password" name="password" required autocomplete="new-password" />
          <small class="muted">8+ characters, including a number, to keep your account secure.</small>
        </div>
        <button class="button" type="submit">Create account</button>
      </form>
      <div style="margin-top: 12px;">
        <a href="../auth/login.html">Already have an account? Sign in</a>
      </div>
    </div>
  </main>

  <script src="../../js/config.js"></script>
  <script src="../../js/api.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/ui.js"></script>
  <script src="../../js/nav.js"></script>
  <script src="../../js/app.js"></script>
  <script src="../../js/pages/auth/register.js"></script>
</body>

</html>
