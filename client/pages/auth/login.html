<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' http://localhost:4000;" />
  <title>Login - WebHarbour</title>
  <link rel="stylesheet" href="../../css/main.css" />
  <link rel="stylesheet" href="../../css/store.css" />
</head>

<body class="store-body" data-auth-page="true">
  <div class="store">
    <aside class="store-sidebar">
      <div class="sidebar-card">
        <div class="sidebar-section">
          <p class="sidebar-title">Browse</p>
          <a class="sidebar-item is-active" href="../../index.html">Home</a>
          <a class="sidebar-item" href="../../pages/apps/index.html">Apps</a>
          <a class="sidebar-item" href="../../pages/user/favorites.html">Library</a>
        </div>
        <div class="sidebar-section">
          <p class="sidebar-title">Workspace</p>
          <a class="sidebar-item" href="../../pages/user/favorites.html">Favorites</a>
          <a class="sidebar-item" data-role="DEVELOPER" href="../../pages/developer/dashboard.html">Developer</a>
        </div>
        <div class="sidebar-section">
          <p class="sidebar-title">Settings</p>
          <a class="sidebar-item" href="../../pages/user/settings.html">Account</a>
          <a class="sidebar-item" data-role="ADMIN" href="../../pages/admin/moderation.html">Admin</a>
        </div>
      </div>
    </aside>

    <div class="store-main">
      <header class="store-topbar">
        <div class="topbar-left">
          <div class="logo">WH</div>
          <div class="app-label">Apps</div>
        </div>
        <div class="topbar-search">
          <span class="search-icon" aria-hidden="true"></span>
          <input class="input" type="search" placeholder="Search apps, tools, categories" />
        </div>
        <div class="topbar-actions">
          <button class="button ghost" id="themeToggle" type="button">Dark mode</button>
          <a class="button ghost auth-action" data-auth="guest" href="../../pages/auth/login.html">Sign In</a>
          <a class="button auth-action" data-auth="guest" href="../../pages/auth/register.html">Create Account</a>
          <a class="button ghost auth-action hidden logout-link" data-auth="authed" data-action="logout" href="#"
            id="logoutLink">Logout</a>
        </div>
      </header>

      <main class="store-content">
        <section class="store-hero fade-up">
          <span class="hero-pill">Welcome back</span>
          <h1 class="hero-title">Sign in to WebHarbour.</h1>
          <p class="hero-sub">Use your account to discover apps, save favorites, and manage posts.</p>
          <form id="loginForm">
            <div class="form-row">
              <label for="email">Email address</label>
              <input id="email" class="input" type="email" name="email" required autocomplete="email" />
            </div>
            <div class="form-row">
              <label for="password">Password</label>
              <input id="password" class="input" type="password" name="password" required
                autocomplete="current-password" />
            </div>
            <button class="button" type="submit">Continue</button>
          </form>
          <div class="stack">
            <a href="../auth/reset-request.html">Forgot your password?</a>
          </div>
        </section>

        <!-- <section class="store-section fade-up delay-1">
          <div class="card auth-card">
            <h2 class="section-title">Sign in to WebHarbour</h2>
            <p class="muted auth-sub">Use your account to discover apps, save favorites, and manage posts.</p>
            
          </div>
        </section> -->
      </main>
    </div>
  </div>

  <script src="../../js/config.js"></script>
  <script src="../../js/api.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/ui.js"></script>
  <script src="../../js/nav.js"></script>
  <script src="../../js/app.js"></script>
  <script src="../../js/pages/theme-toggle.js"></script>
  <script src="../../js/pages/auth/login.js"></script>
</body>

</html>
