<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' http://localhost:4000;" />
  <title>Login - WebHarbour</title>
  <link rel="stylesheet" href="../../css/main.css" />
</head>

<body>
  <div id="nav"></div>
  <main class="container">
    <div class="card" style="max-width: 480px; margin: 0 auto;">
      <h2 class="section-title">Sign in to WebHarbour</h2>
      <p class="muted" style="margin-bottom: 16px;">Use your account to discover apps, save favorites, and manage posts.
      </p>
      <form id="loginForm">
        <div class="form-row">
          <label for="email">Email address</label>
          <input id="email" class="input" type="email" name="email" required autocomplete="email" />
        </div>
        <div class="form-row">
          <label for="password">Password</label>
          <input id="password" class="input" type="password" name="password" required autocomplete="current-password" />
        </div>
        <button class="button" type="submit">Continue</button>
      </form>
      <div style="margin-top: 12px;">
        <a href="../auth/reset-request.html">Forgot your password?</a>
      </div>
    </div>
  </main>

  <script src="../../js/config.js"></script>
  <script src="../../js/api.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/ui.js"></script>
  <script src="../../js/nav.js"></script>
  <script src="../../js/app.js"></script>
  <script src="../../js/pages/auth/login.js"></script>
</body>

</html>
