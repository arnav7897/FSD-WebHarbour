<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' http://localhost:4000;" />
  <title>Catalog - WebHarbour</title>
  <link rel="stylesheet" href="../../css/main.css" />
  <link rel="stylesheet" href="../../css/store.css" />
</head>
<body class="store-body" data-requires-role="ADMIN">
  <div class="store">
    <aside class="store-sidebar">
      <div class="sidebar-card">
        <div class="sidebar-section">
          <p class="sidebar-title">Browse</p>
          <a class="sidebar-item" href="../../index.html">Home</a>
          <a class="sidebar-item" href="../../pages/apps/index.html">Apps</a>
          <a class="sidebar-item" href="../../pages/user/favorites.html">Library</a>
        </div>
        <div class="sidebar-section">
          <p class="sidebar-title">Workspace</p>
          <a class="sidebar-item" href="../../pages/user/favorites.html">Favorites</a>
          <a class="sidebar-item" data-role="DEVELOPER" href="../../pages/developer/dashboard.html">Developer</a>
        </div>
        <div class="sidebar-section">
          <p class="sidebar-title">Settings</p>
          <a class="sidebar-item" href="../../pages/user/settings.html">Account</a>
          <a class="sidebar-item is-active" data-role="ADMIN" href="../../pages/admin/moderation.html">Admin</a>
        </div>
      </div>
    </aside>

    <div class="store-main">
      <header class="store-topbar">
        <div class="topbar-left">
          <div class="logo">WH</div>
          <div class="app-label">Apps</div>
        </div>
        <div class="topbar-search">
          <span class="search-icon" aria-hidden="true"></span>
          <input class="input" type="search" placeholder="Search apps, tools, categories" />
        </div>
        <div class="topbar-actions">
          <button class="button ghost" id="themeToggle" type="button">Dark mode</button>
          <a class="button ghost auth-action" data-auth="guest" href="../../pages/auth/login.html">Sign In</a>
          <a class="button auth-action" data-auth="guest" href="../../pages/auth/register.html">Create Account</a>
          <a class="button ghost auth-action hidden logout-link" data-auth="authed" data-action="logout" href="#" id="logoutLink">Logout</a>
        </div>
      </header>

      <main class="store-content">
        <section class="store-hero fade-up">
          <span class="hero-pill">Catalog</span>
          <h1 class="hero-title">Manage categories and tags.</h1>
          <p class="hero-sub">Keep discovery clean and organized across the marketplace.</p>
        </section>

        <section class="store-section fade-up delay-1">
          <div class="section-head">
            <h2 class="section-title">Catalog Management</h2>
            <div class="toolbar">
              <a class="button secondary" href="../admin/moderation.html">Moderation</a>
              <a class="button secondary" href="../admin/reports.html">Reports</a>
            </div>
          </div>
        </section>

        <section class="store-section fade-up delay-2">
          <div class="grid grid-2">
            <div class="card">
              <h3>Categories</h3>
              <form id="categoryForm">
                <div class="form-row">
                  <label>Name</label>
                  <input class="input" name="name" required />
                </div>
                <button class="button" type="submit">Add category</button>
              </form>
              <div id="categoryList" class="stack"></div>
            </div>
            <div class="card">
              <h3>Tags</h3>
              <form id="tagForm">
                <div class="form-row">
                  <label>Name</label>
                  <input class="input" name="name" required />
                </div>
                <button class="button" type="submit">Add tag</button>
              </form>
              <div id="tagList" class="stack"></div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script src="../../js/config.js"></script>
  <script src="../../js/api.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/ui.js"></script>
  <script src="../../js/nav.js"></script>
  <script src="../../js/app.js"></script>
  <script src="../../js/pages/theme-toggle.js"></script>
  <script src="../../js/pages/admin/catalog.js"></script>
</body>
</html>
