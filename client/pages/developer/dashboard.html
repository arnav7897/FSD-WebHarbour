<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' http://localhost:4000;" />
  <title>Developer Dashboard - WebHarbour</title>
  <link rel="stylesheet" href="../../css/main.css" />
</head>
<body data-requires-role="DEVELOPER">
  <div id="nav"></div>
  <main class="container">
    <div class="toolbar" style="justify-content: space-between;">
      <h2 class="section-title">Developer Dashboard</h2>
      <div class="toolbar">
        <span id="devStatusText" class="muted"></span>
        <button class="button" id="becomeDev">Request Developer Access</button>
        <button class="button secondary hidden" id="refreshDev">Refresh Session</button>
      </div>
    </div>

    <section class="card" style="margin-bottom: 24px;">
      <h3>Create App</h3>
      <form id="createAppForm">
        <div class="form-row">
          <label>Name</label>
          <input class="input" type="text" name="name" required />
        </div>
        <div class="form-row">
          <label>Description</label>
          <textarea class="input" name="description" required></textarea>
        </div>
        <div class="form-row">
          <label>Category</label>
          <select id="categorySelect" name="categoryId" required></select>
        </div>
        <div class="form-row">
          <label>Tags (comma separated IDs)</label>
          <input class="input" type="text" name="tags" placeholder="1,2,3" />
        </div>
        <button class="button" type="submit">Create</button>
      </form>
    </section>

    <section>
      <h3>Apps (status filter)</h3>
      <div class="toolbar">
        <select id="statusFilter">
          <option value="">All</option>
          <option value="DRAFT">DRAFT</option>
          <option value="UNDER_REVIEW">UNDER_REVIEW</option>
          <option value="PUBLISHED">PUBLISHED</option>
          <option value="REJECTED">REJECTED</option>
          <option value="SUSPENDED">SUSPENDED</option>
        </select>
        <button class="button secondary" id="reloadApps">Load</button>
      </div>
      <div id="appsGrid" class="grid grid-3"></div>
    </section>
  </main>

  <script src="../../js/config.js"></script>
  <script src="../../js/api.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/ui.js"></script>
  <script src="../../js/nav.js"></script>
  <script src="../../js/app.js"></script>
  <script src="../../js/pages/developer/dashboard.js"></script>
</body>
</html>
