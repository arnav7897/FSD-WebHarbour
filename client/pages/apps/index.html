<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Marketplace - WebHarbour</title>
  <link rel="stylesheet" href="../../css/main.css" />
</head>
<body>
  <div id="nav"></div>
  <main class="container">
    <h2 class="section-title">Marketplace</h2>
    <div class="toolbar">
      <input class="input" type="search" id="searchInput" placeholder="Search apps" />
      <select id="categorySelect"></select>
      <select id="tagSelect"></select>
      <button class="button secondary" id="applyFilters">Apply</button>
    </div>
    <div id="appsGrid" class="grid grid-3"></div>
    <div class="toolbar" style="justify-content: space-between;">
      <button class="button ghost" id="prevPage">Prev</button>
      <div id="pageInfo"></div>
      <button class="button ghost" id="nextPage">Next</button>
    </div>
  </main>

  <script src="../../js/config.js"></script>
  <script src="../../js/api.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/ui.js"></script>
  <script src="../../js/nav.js"></script>
  <script src="../../js/app.js"></script>
  <script src="../../js/pages/apps/list.js"></script>
</body>
</html>
