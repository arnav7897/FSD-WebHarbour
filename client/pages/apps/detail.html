<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' http://localhost:4000;" />
  <title>App Detail - WebHarbour</title>
  <link rel="stylesheet" href="../../css/main.css" />
</head>
<body>
  <div id="nav"></div>
  <main class="container">
    <div id="appHeader" class="card"></div>

    <section style="margin-top: 24px;">
      <h2 class="section-title">Versions</h2>
      <div id="versionList" class="grid grid-2"></div>
    </section>

    <section style="margin-top: 24px;">
      <h2 class="section-title">Reviews</h2>
      <div class="card" style="margin-bottom: 16px;">
        <form id="reviewForm">
          <div class="form-row">
            <label>Rating (1-5)</label>
            <input class="input" type="number" name="rating" min="1" max="5" required />
          </div>
          <div class="form-row">
            <label>Title</label>
            <input class="input" type="text" name="title" />
          </div>
          <div class="form-row">
            <label>Comment</label>
            <textarea class="input" name="comment"></textarea>
          </div>
          <button class="button" type="submit">Submit review</button>
        </form>
      </div>
      <div id="reviewList"></div>
    </section>

    <section style="margin-top: 24px;">
      <h2 class="section-title">Report this app</h2>
      <div class="card">
        <form id="reportForm">
          <div class="form-row">
            <label>Reason</label>
            <input class="input" type="text" name="reason" required />
          </div>
          <div class="form-row">
            <label>Description</label>
            <textarea class="input" name="description"></textarea>
          </div>
          <button class="button danger" type="submit">Report</button>
        </form>
      </div>
    </section>
  </main>

  <script src="../../js/config.js"></script>
  <script src="../../js/api.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/ui.js"></script>
  <script src="../../js/nav.js"></script>
  <script src="../../js/app.js"></script>
  <script src="../../js/pages/apps/detail.js"></script>
</body>
</html>
